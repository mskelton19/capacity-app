apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "capacity-review.fullname" . }}
  labels:
    {{- include "capacity-review.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "capacity-review.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "capacity-review.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: {{ include "capacity-review.postgresHost" . | quote }}
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: DB_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.postgresql.auth.existingSecret }}
                  name: {{ .Values.postgresql.auth.existingSecret }}
                  key: password
                  {{- else }}
                  name: {{ .Release.Name }}-postgresql
                  key: password
                  {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "capacity-review.fullname" . }}
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /api/state
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/state
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
